# SpringPost — docker compose up -d
services:
  bot:
    build: .
    image: springpost:latest
    container_name: springpost
    env_file: .env
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - springpost_data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import aiogram, aiohttp; print('ok')"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 45s

volumes:
  springpost_data:
